<section class="enrollment-form">
  <h2>Enrollment Request (Template-Driven Form)</h2>
  <p>
    <a routerLink="/enroll/reactive">Switch to the reactive form &rarr;</a>
  </p>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">
    <div class="field">
      <label for="studentName">Student Name</label>
      <input
        id="studentName"
        name="studentName"
        [(ngModel)]="studentName"
        required
        minlength="3"
        #nameCtrl="ngModel"
      >
      <span class="error" *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">
        Name is required.
      </span>
      <span class="error" *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">
        Name must be at least 3 characters.
      </span>
    </div>

    <div class="field">
      <label for="studentEmail">Student Email</label>
      <input
        id="studentEmail"
        name="studentEmail"
        type="email"
        [(ngModel)]="studentEmail"
        required
        email
        #emailCtrl="ngModel"
      >
      <span class="error" *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">
        Email is required.
      </span>
      <span class="error" *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">
        Enter a valid email address.
      </span>
    </div>

    <div class="field">
      <label for="courseId">Course ID</label>
      <input
        id="courseId"
        name="courseId"
        type="number"
        [(ngModel)]="courseId"
        required
        #courseIdCtrl="ngModel"
      >
      <span class="error" *ngIf="courseIdCtrl.touched && courseIdCtrl.errors?.['required']">
        Course ID is required.
      </span>
    </div>

    <div class="field">
      <label for="preferredSemester">Preferred Semester</label>
      <select id="preferredSemester" name="preferredSemester" [(ngModel)]="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <div class="field checkbox">
      <label>
        <input
          type="checkbox"
          name="agreeToTerms"
          [(ngModel)]="agreeToTerms"
          required
          #termsCtrl="ngModel"
        >
        I agree to the terms and conditions
      </label>
      <span class="error" *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']">
        You must agree to the terms.
      </span>
    </div>

    <div class="actions">
      <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
      <button type="button" (click)="onReset(enrollForm)">Reset</button>
    </div>

    <div class="success" *ngIf="submitted">
      Enrollment request submitted successfully!
    </div>
  </form>
</section>
