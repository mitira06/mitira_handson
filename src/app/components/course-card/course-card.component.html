<div class="course-card" [ngClass]="cardClasses" [ngStyle]="borderStyle" [appHighlight]="'#fef9c3'">
  <h3>{{ course.name }}</h3>
  <p class="code">{{ course.code }} &middot; {{ course.credits | creditLabel }}</p>

  <!-- *ngSwitch grade status badge -->
  <span class="badge" [ngSwitch]="course.gradeStatus">
    <span *ngSwitchCase="'passed'" class="badge badge--passed">Passed</span>
    <span *ngSwitchCase="'failed'" class="badge badge--failed">Failed</span>
    <span *ngSwitchDefault class="badge badge--pending">Pending</span>
  </span>

  <div class="actions">
    <button type="button" (click)="onEnrollClick()">
      {{ enrolled ? 'Unenroll' : 'Enroll' }}
    </button>
    <button type="button" class="secondary" (click)="toggleExpanded()">
      {{ isExpanded ? 'Hide Details' : 'Show Details' }}
    </button>
  </div>

  <div class="details" *ngIf="isExpanded">
    <p>Course ID: {{ course.id }}</p>
    <p>Status: {{ course.gradeStatus }}</p>
  </div>
</div>
