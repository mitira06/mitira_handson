# ============================================================
# Exercise 1: H2 Database connection (primary datasource)
# Exercise 9: Externalized / customized data source configuration
#             (bound to app.datasource.primary / app.datasource.secondary
#              via DataSourceProperties in config/PrimaryDataSourceConfig
#              and config/SecondaryDataSourceConfig)
# ============================================================
app.datasource.primary.url=jdbc:h2:mem:emsdb;DB_CLOSE_DELAY=-1
app.datasource.primary.driver-class-name=org.h2.Driver
app.datasource.primary.username=sa
app.datasource.primary.password=password

app.datasource.secondary.url=jdbc:h2:mem:auditdb;DB_CLOSE_DELAY=-1
app.datasource.secondary.driver-class-name=org.h2.Driver
app.datasource.secondary.username=sa
app.datasource.secondary.password=password

# ============================================================
# Exercise 10: Hibernate dialect + properties + batch processing
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Batch processing tuning (used by EmployeeService#bulkInsertEmployees)
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# H2 console (browse http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080
