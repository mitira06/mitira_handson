# Spring Framework and application log
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate logs for displaying executed SQL, input and output
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# ===================================================================
# Database configuration - H2 IN-MEMORY (no install needed)
# Switch to the commented-out MySQL block below once MySQL is available
# ===================================================================
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# H2 web console (optional) - browse the in-memory DB at http://localhost:8080/h2-console
spring.h2.console.enabled=true

# Run data.sql AFTER Hibernate creates the schema (ddl-auto), not before.
# Without this, Spring Boot tries to insert into 'country' before the table exists.
spring.jpa.defer-datasource-initialization=true

# Hibernate configuration
# create-drop: creates tables on startup, drops them on shutdown (fine for H2 in-memory)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

