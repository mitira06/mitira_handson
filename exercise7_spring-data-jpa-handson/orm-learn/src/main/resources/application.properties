# Spring Framework and application log
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate logs for displaying executed SQL, input and output
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# ===================================================================
# Database configuration - PostgreSQL
# Update username/password below to match your local PostgreSQL setup.
# Create the database first (see postgresql-handson-guide.sql / README):
#   CREATE DATABASE ormlearn;
# ===================================================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/ormlearn
spring.datasource.username=postgres
spring.datasource.password=root
spring.sql.init.mode=always

# Run data.sql AFTER Hibernate creates the schema (ddl-auto), not before.
spring.jpa.defer-datasource-initialization=true

# Hibernate configuration
# update: creates tables/columns if missing, but does NOT drop them on shutdown.
# This is important for PostgreSQL since you'll want the tables/data to still be
# there in pgAdmin/psql AFTER the app stops, so you can take screenshots.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# NOTE: data.sql will insert the seed rows (countries, departments, employees, skills).
# It runs on EVERY startup. The first run will succeed. If you restart the app a second
# time, the inserts will fail with "duplicate key" errors because the rows already exist.
# That's expected — either ignore those errors (the app still starts fine, Hibernate just
# logs them) or truncate the tables in psql before re-running if you want a clean reload:
#   TRUNCATE country, employee_skill, employee, department, skill RESTART IDENTITY CASCADE;
