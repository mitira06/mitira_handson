# Exercise 9: Database connection properties

# Use 8081 instead of the default 8080, in case something else on your
# machine (another app, or a leftover previous run) is already using 8080.
server.port=8081

# H2 in-memory database -- exists only while the app is running, resets on restart
spring.datasource.url=jdbc:h2:mem:librarydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate auto-create tables from our @Entity classes on startup
spring.jpa.hibernate.ddl-auto=update

# Show SQL statements in the console (handy for learning what JPA does)
spring.jpa.show-sql=true

# Enable the H2 web console at http://localhost:8081/h2-console (for inspecting the DB visually)
spring.h2.console.enabled=true
